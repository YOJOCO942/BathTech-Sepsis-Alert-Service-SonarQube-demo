# BathTech CI/CD Pipeline — GitHub Actions
# This workflow mirrors the 10-stage pipeline described in the report.
# For the video demo, this file shows how the quality gate integrates
# into the actual CI/CD flow.

name: BathTech CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # Stage 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for SonarQube new code analysis

      # Stage 2: Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Stage 3: Build + Unit Tests + Integration Tests
      - name: Build and run tests
        run: mvn clean verify --batch-mode

      # Stage 4: SonarQube static analysis + quality gate
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Stage 5: Wait for quality gate result
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Stage 6: Dependency vulnerability scan
      - name: Snyk security scan
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
